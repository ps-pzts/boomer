name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: Syntax check — all Python files
        run: find src tests -name "*.py" | xargs python -m py_compile

      - name: Check no file exceeds 600 lines
        run: |
          python - <<'EOF'
          import pathlib, sys
          violations = []
          for p in pathlib.Path("src").rglob("*.py"):
              lines = p.read_text().splitlines()
              if len(lines) > 600:
                  first_line = lines[0] if lines else ""
                  if (
                      "auto-generated" not in first_line.lower()
                      and "cannot be split" not in first_line.lower()
                  ):
                      violations.append((str(p), len(lines)))
          if violations:
              for path, n in violations:
                  print(f"FAIL: {path} has {n} lines (limit 600)")
              sys.exit(1)
          print("All files within 600-line limit.")
          EOF

  # ── Job 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations on test DB
        run: |
          PYTHONPATH=src python - <<'EOF'
          from src.db.migrations import run_migrations
          run_migrations("/tmp/boomer_test.db")
          print("Migrations OK")
          EOF

      - name: Run tests
        run: |
          BOOMER_DB_PATH=/tmp/boomer_test.db \
          PYTHONPATH=src \
          pytest tests/ -x --tb=short --cov=src --cov-report=term-missing
        env:
          KITE_API_KEY: ""
          KITE_ACCESS_TOKEN: ""
          FYERS_CLIENT_ID: ""
          FYERS_ACCESS_TOKEN: ""
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""

  # ── Job 3: Docker build & push to GHCR ────────────────────────────────────
  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # PR builds: tag with pr-<number>
            type=ref,event=pr,prefix=pr-
            # main builds: tag with latest + short SHA
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
